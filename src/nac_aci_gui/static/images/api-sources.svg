<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!-- Define gradients and styles -->
  <defs>
    <!-- Gradient for ITSM button -->
    <linearGradient id="itsmGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for Private Portal button -->
    <linearGradient id="portalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for NaC-API button -->
    <linearGradient id="nacGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for SCM button -->
    <linearGradient id="scmGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748B" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E293B" text-anchor="middle">NaC-API integration</text>

  <!-- ITSM Button (Top Left) -->
  <g id="itsm">
    <rect x="150" y="100" width="200" height="80" rx="8" fill="url(#itsmGradient)" />
    <rect x="150" y="100" width="200" height="80" rx="8" fill="none" stroke="#9F1239" stroke-width="2" />
    <text x="250" y="145" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ITSM</text>
    <text x="250" y="165" font-family="Arial, sans-serif" font-size="12" fill="#FCE7F3" text-anchor="middle">Service Tickets</text>

    <!-- ITSM Icon - Ticket/Document -->
    <g opacity="0.8">
      <rect x="205" y="30" width="90" height="60" rx="5" stroke="#EC4899" stroke-width="4" fill="none" />
      <line x1="215" y1="45" x2="285" y2="45" stroke="#EC4899" stroke-width="3" stroke-linecap="round" />
      <line x1="215" y1="60" x2="270" y2="60" stroke="#EC4899" stroke-width="3" stroke-linecap="round" />
      <line x1="215" y1="75" x2="285" y2="75" stroke="#EC4899" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>

  <!-- Private Portal Button (Top Right) -->
  <g id="portal">
    <rect x="550" y="100" width="200" height="80" rx="8" fill="url(#portalGradient)" />
    <rect x="550" y="100" width="200" height="80" rx="8" fill="none" stroke="#5B21B6" stroke-width="2" />
    <text x="650" y="145" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Private Portal</text>
    <text x="650" y="165" font-family="Arial, sans-serif" font-size="12" fill="#EDE9FE" text-anchor="middle">Self-Service</text>

    <!-- Portal Icon - Globe/Portal -->
    <g opacity="0.8">
      <circle cx="650" cy="60" r="35" stroke="#8B5CF6" stroke-width="4" fill="none" />
      <ellipse cx="650" cy="60" rx="12" ry="35" stroke="#8B5CF6" stroke-width="4" fill="none" />
      <line x1="615" y1="60" x2="685" y2="60" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" />
      <line x1="650" y1="25" x2="650" y2="95" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" />
    </g>
  </g>

  <!-- Arrow from ITSM to NaC-API -->
  <path d="M 250 180 L 250 230 L 370 270" stroke="#64748B" stroke-width="3" fill="none" marker-end="url(#arrowhead)" />

  <!-- Arrow from Private Portal to NaC-API -->
  <path d="M 650 180 L 650 230 L 530 270" stroke="#64748B" stroke-width="3" fill="none" marker-end="url(#arrowhead)" />

  <!-- NaC-API Button (Middle Center) -->
  <g id="nacapi">
    <rect x="350" y="280" width="200" height="80" rx="8" fill="url(#nacGradient)" />
    <rect x="350" y="280" width="200" height="80" rx="8" fill="none" stroke="#312E81" stroke-width="2" />
    <text x="450" y="325" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">NaC-API</text>
    <text x="450" y="345" font-family="Arial, sans-serif" font-size="12" fill="#E0E7FF" text-anchor="middle">Network as Code API</text>

    <!-- API Icon - Curly Braces -->
    <g opacity="0.8">
      <path d="M 400 215 C 390 215 385 225 385 235 L 385 245 C 385 255 380 260 370 260 C 380 260 385 265 385 275 L 385 285 C 385 295 390 305 400 305"
            stroke="#4F46E5" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 500 215 C 510 215 515 225 515 235 L 515 245 C 515 255 520 260 530 260 C 520 260 515 265 515 275 L 515 285 C 515 295 510 305 500 305"
            stroke="#4F46E5" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      <text x="450" y="265" font-family="monospace" font-size="28" font-weight="bold" fill="#4F46E5" text-anchor="middle">API</text>
    </g>
  </g>

  <!-- Arrow from NaC-API to SCM (vertical) -->
  <line x1="450" y1="360" x2="450" y2="390" stroke="#64748B" stroke-width="3" marker-end="url(#arrowhead)" />

  <!-- SCM Button (Bottom Center - Below NaC-API) -->
  <g id="scm">
    <rect x="350" y="400" width="200" height="80" rx="8" fill="url(#scmGradient)" />
    <rect x="350" y="400" width="200" height="80" rx="8" fill="none" stroke="#9F1239" stroke-width="2" />
    <text x="450" y="435" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SCM</text>
    <text x="450" y="455" font-family="Arial, sans-serif" font-size="11" fill="#FCE7F3" text-anchor="middle">Version Control</text>
    <text x="450" y="470" font-family="Arial, sans-serif" font-size="11" fill="#FCE7F3" text-anchor="middle">Source Code Management</text>

    <!-- SCM Icon - Git branch (to the right of button) -->
    <g opacity="0.8">
      <!-- Main branch line -->
      <line x1="570" y1="415" x2="570" y2="465" stroke="#EC4899" stroke-width="5" stroke-linecap="round" />
      <!-- Branch line -->
      <path d="M 570 430 Q 590 430 600 445 L 600 465" stroke="#EC4899" stroke-width="5" fill="none" stroke-linecap="round" />
      <!-- Commit circles -->
      <circle cx="570" cy="415" r="6" fill="#EC4899" />
      <circle cx="570" cy="440" r="6" fill="#EC4899" />
      <circle cx="570" cy="465" r="6" fill="#EC4899" />
      <circle cx="600" cy="450" r="6" fill="#EC4899" />
      <circle cx="600" cy="465" r="6" fill="#EC4899" />
    </g>
  </g>
</svg>
