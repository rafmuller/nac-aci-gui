unknown_ipv4_multicast: flood
unknown_ipv6_multicast: flood
unicast_routing: true
clear_remote_mac_entries: true
advertise_host_routes: true
l3_multicast: false
multicast_arp_drop: false
vrf: {{vrf_name}}
subnets:
  - ip: {{ bd_subnet }}
    description: Subnet for {{ bd_name }} Bridge Domain via NaC
    primary_ip: true
    public: false
    igmp_querier: true
    nd_ra_prefix: true
